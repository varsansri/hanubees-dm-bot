services:
  - type: web
    name: hanubees-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_REDIRECT_URI
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: WEBHOOK_VERIFY_TOKEN
        sync: false
